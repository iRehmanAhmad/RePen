name: Verify RePen

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  verify:
    name: Windows test and build
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run automated checks
        run: npm test

      - name: Build renderer and Electron modules
        run: npm run build:all
