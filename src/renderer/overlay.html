<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RePen</title>
    <link rel="stylesheet" href="./overlay.css" />
  </head>
  <body>
    <canvas id="stage" aria-label="annotation canvas"></canvas>
    <div id="boardNav" class="board-nav" aria-label="Notebook Pages & Session">
      <button class="board-btn" id="prevPageButton" title="Previous Page (Ctrl+Alt+Left)" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <span id="pageIndicator" class="board-page-count" title="Current Notebook Page">Page 1 / 1</span>
      <button class="board-btn" id="nextPageButton" title="Next Page / + New Page (Ctrl+Alt+Right)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
      </button>
      <button class="board-btn" id="newBoardButton" title="New Notebook / Reset Board [Ctrl+Alt+N]">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      </button>
      <button class="board-btn" id="saveSessionButton" title="Save Notebook Session (.rpen) [Ctrl+Alt+S]">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      </button>
      <button class="board-btn" id="loadSessionButton" title="Open Notebook Session (.rpen) [Ctrl+Alt+O]">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="board-btn" id="exportPdfButton" title="Export Notebook as PDF (.pdf) [Ctrl+Alt+E]">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M12 18v-6"/><path d="m9 15 3 3 3-3"/></svg>
      </button>
      <div class="board-nav-separator"></div>
      <div class="board-pattern-group" aria-label="Board Patterns">
        <button class="board-btn pattern-btn" data-pattern="whiteboard" title="Plain Whiteboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="14" x="3" y="3" rx="2" fill="#ffffff" stroke="#ccc"/></svg></button>
        <button class="board-btn pattern-btn" data-pattern="blackboard" title="Plain Blackboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="14" x="3" y="3" rx="2" fill="#18181c" stroke="#888"/></svg></button>
        <button class="board-btn pattern-btn" data-pattern="grid" title="Grid / Graph Paper"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="14" x="3" y="3" rx="2"/><path d="M9 3v14"/><path d="M15 3v14"/><path d="M3 8h18"/><path d="M3 12h18"/></svg></button>
        <button class="board-btn pattern-btn" data-pattern="ruled" title="Ruled Notebook Lines"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="14" x="3" y="3" rx="2"/><path d="M7 3v14"/><path d="M3 8h18"/><path d="M3 12h18"/><path d="M3 16h18"/></svg></button>
        <button class="board-btn pattern-btn" data-pattern="staff" title="Music Staff / Cornell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="14" x="3" y="3" rx="2"/><path d="M3 6h18"/><path d="M3 9h18"/><path d="M3 12h18"/><path d="M3 15h18"/></svg></button>
      </div>
      <div class="board-nav-separator"></div>
      <div class="board-color-group" aria-label="Board Background Color">
        <button class="board-swatch" data-board-color="#ffffff" style="background: #ffffff;" title="White"></button>
        <button class="board-swatch" data-board-color="#18181c" style="background: #18181c;" title="Black"></button>
        <button class="board-swatch" data-board-color="#1a3320" style="background: #1a3320;" title="Chalkboard Green"></button>
        <button class="board-swatch" data-board-color="#fef8e2" style="background: #fef8e2;" title="Legal Pad Cream"></button>
        <button class="board-swatch" data-board-color="#0f172a" style="background: #0f172a;" title="Dark Navy"></button>
        <label class="board-color-picker-label" title="Custom Background Color">
          <input type="color" id="boardCustomColorPicker" value="#ffffff" />
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
        </label>
      </div>
    </div>
    <div id="boardScrollbar" class="board-scrollbar" aria-label="Page Scrollbar">
      <div id="boardScrollThumb" class="board-scroll-thumb" title="Drag or scroll to switch pages"></div>
    </div>
    <div id="pageToast" class="page-toast"></div>
    <script src="./overlay.js"></script>
  </body>
</html>
