<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RePen - Presenter Overlay Palette</title>
    <link rel="stylesheet" href="./toolbar.css" />
  </head>
  <body>
    <div class="app-container" id="appContainer">
      <!-- Primary Vertical Palette (The Pen Bar) -->
      <nav class="pen-bar" id="penBar" aria-label="Main Toolbar">
        <!-- Drag Grip Header -->
        <div class="drag-header" id="dragHeader">
          <button class="mark-mini" id="collapseBtn" title="Minimize / Expand / Drag">
            <svg class="brand-pencil-icon" viewBox="0 0 512 512" aria-hidden="true">
              <polygon fill="#424242" points="255.999,109.533 235.1,193.394 296.848,172.495"/>
              <polygon fill="#707070" points="215.15,172.495 255.999,193.394 255.999,109.533"/>
              <path fill="#FFBA00" d="M296.848,172.495h-40.849L235.1,289.387c60.398,0,109.776-42.862,109.778-42.863L296.848,172.495z"/>
              <path fill="#FDE09C" d="M215.15,172.495l-48.03,74.03c0.001,0.001,28.481,42.863,88.879,42.863V172.495H215.15z"/>
              <path fill="#424242" d="M285.625,266.588c-8.852,1.176-18.71,1.9-29.626,1.9L235.1,389.293l20.899,122.706h29.626l20.899-122.706L285.625,266.588z"/>
              <path fill="#FF8E00" d="M344.877,246.524c-0.001,0.001-19.132,14.735-59.253,20.063v245.412h59.253V246.524z"/>
              <path fill="#707070" d="M226.373,266.588l-20.899,122.706L226.373,512h29.626V268.488c-10.917,0-20.775-0.724-29.626-1.9z"/>
              <path fill="#FFBA00" d="M167.12,246.524v265.475h59.253V266.588c-40.121-5.329-59.252-20.063-59.253-20.064z"/>
              <polygon fill="#003DA8" points="271.673,0 255.999,0 245.55,29.546 255.999,59.091 271.673,59.091"/>
              <rect x="310.673" y="29.136" transform="matrix(-0.7071 -0.7071 0.7071 -0.7071 515.6158 330.9375)" fill="#003DA8" width="31.348" height="59.091"/>
              <rect x="126.96" y="113.366" fill="#2F91ED" width="59.092" height="31.348"/>
              <rect x="325.949" y="113.366" fill="#003DA8" width="59.092" height="31.348"/>
              <rect x="156.105" y="43.008" transform="matrix(-0.7071 -0.7071 0.7071 -0.7071 275.4308 231.4505)" fill="#2F91ED" width="59.091" height="31.348"/>
              <rect x="240.326" fill="#2F91ED" width="15.674" height="59.092"/>
            </svg>
          </button>
        </div>

        <div class="divider"></div>

        <!-- Unified Compact Tool Stack -->
        <div class="tool-column" aria-label="Drawing & Presentation Tools">
          <!-- 1. Cursor / Move Mode -->
          <button class="tool-button icon-tool" id="togglePassThrough" title="Cursor / Move Annotations" aria-label="Cursor and move annotations">
            <svg viewBox="0 0 100 100" fill="none"><path d="M 5,5 90,30 65,50 95,80 80,95 50,65 30,90 z" fill="#ffffff" stroke="#000000" stroke-width="7" stroke-linejoin="miter"/></svg>
          </button>



          <div class="divider"></div>

          <!-- 2. Inking Group (Pen, Highlighter, Laser, Text, Spotlight, Magnifier) -->
          <div class="grouped-tool-container" id="inkingGroupContainer">
            <button class="tool-button icon-tool active grouped-main-btn" data-tool="pen" id="inkingGroupBtn" title="Inking Tools (Pen active)">
              <svg id="inkingGroupIcon" viewBox="0 0 512 512" fill="currentColor" stroke="none"><path d="M334.857,166.955l-65.516-65.531c-39.469,23.672-126.656,62.688-126.656,62.688c-19.719,8.172-33.938,25.813-37.734,46.813L60.826,416.596l-25.313,25.313c-9.125-0.109-18.281,3.297-25.234,10.25c-13.703,13.688-13.703,35.875,0,49.563c13.688,13.703,35.891,13.703,49.578,0c6.953-6.953,10.359-16.109,10.234-25.219l25.313-25.313l205.688-44.125c21-3.813,38.625-18.031,46.797-37.734c0,0,39.047-87.156,62.734-126.609l-65.531-65.531L334.857,166.955z M269.889,302.127c-15.25,15.25-39.188,16.438-55.813,3.641L63.436,456.408c-1.094-1.484-2.25-2.922-3.578-4.25c-1.344-1.344-2.766-2.5-4.25-3.578l150.641-150.641c-12.813-16.641-11.625-40.563,3.625-55.813c16.578-16.578,43.438-16.578,60.016,0S286.467,285.564,269.889,302.127z"/><path d="M511.998,139.705L372.311,0.002c0,0-29.375,29.375-45.156,45.156s-36.297,11.047-36.297,11.047l-18.953,18.938l66.297,66.297l15.781,15.781l82.875,82.875l18.938-18.938c0,0-4.734-20.516,11.047-36.313C482.639,169.064,511.998,139.705,511.998,139.705z"/></svg>
              <span class="group-indicator" aria-hidden="true"></span>
            </button>
            <div class="grouped-popover" id="inkingGroupPopover">
              <button class="popover-btn active" data-subtool="pen" title="Pen Tool (Ctrl+Shift+1)">
                <svg viewBox="0 0 512 512" fill="currentColor" stroke="none"><path d="M334.857,166.955l-65.516-65.531c-39.469,23.672-126.656,62.688-126.656,62.688c-19.719,8.172-33.938,25.813-37.734,46.813L60.826,416.596l-25.313,25.313c-9.125-0.109-18.281,3.297-25.234,10.25c-13.703,13.688-13.703,35.875,0,49.563c13.688,13.703,35.891,13.703,49.578,0c6.953-6.953,10.359-16.109,10.234-25.219l25.313-25.313l205.688-44.125c21-3.813,38.625-18.031,46.797-37.734c0,0,39.047-87.156,62.734-126.609l-65.531-65.531L334.857,166.955z M269.889,302.127c-15.25,15.25-39.188,16.438-55.813,3.641L63.436,456.408c-1.094-1.484-2.25-2.922-3.578-4.25c-1.344-1.344-2.766-2.5-4.25-3.578l150.641-150.641c-12.813-16.641-11.625-40.563,3.625-55.813c16.578-16.578,43.438-16.578,60.016,0S286.467,285.564,269.889,302.127z"/><path d="M511.998,139.705L372.311,0.002c0,0-29.375,29.375-45.156,45.156s-36.297,11.047-36.297,11.047l-18.953,18.938l66.297,66.297l15.781,15.781l82.875,82.875l18.938-18.938c0,0-4.734-20.516,11.047-36.313C482.639,169.064,511.998,139.705,511.998,139.705z"/></svg>
              </button>
              <button class="popover-btn" data-subtool="calligraphy" title="Calligraphy Pen">
                <svg viewBox="0 0 16 16" fill="currentColor" stroke="none"><path d="M10.723,0.04 L9.938,1.883 L14.188,6.133 L16.018,5.36 L10.723,0.04 Z"/><path d="M3.357,6.132 C3.357,6.132 4.297,10.345 0.063,14.579 C0.16,14.677 0.263,14.779 0.365,14.881 L7.129,8.117 C7.039,7.924 6.984,7.711 6.984,7.484 C6.984,6.656 7.656,5.984 8.484,5.984 C9.312,5.984 9.984,6.656 9.984,7.484 C9.984,8.312 9.312,8.984 8.484,8.984 C8.249,8.984 8.029,8.925 7.83,8.828 L1.072,15.588 C1.206,15.722 1.309,15.825 1.461,15.977 C5.71,11.729 9.924,12.685 9.924,12.685 L12.682,6.631 L9.387,3.336 L3.357,6.132 L3.357,6.132 Z"/></svg>
              </button>
              <button class="popover-btn" data-subtool="highlighter" title="Highlighter (Ctrl+Shift+2)">
                <svg viewBox="0 0 490 490" fill="currentColor" stroke="none"><path d="M463.383,27.507C416.65-18.151,362.832,2.481,342.27,22.056L95.791,237.297c-2.107,1.844-3.379,4.47-3.525,7.275 L51.87,366.91L0,420.834L102.596,490l34.265-35.614l117.468-41.924c2.831-0.205,5.453-1.567,7.244-3.784L468.61,152.441 C498.522,115.418,497.318,60.661,463.383,27.507z M99.772,463.161l-67.845-45.735L60.903,387.3l31.44,32.688l24.478,25.45 L99.772,463.161z M133.943,433.454l-55.607-57.812l-5.697-5.923l34.255-103.742l126.839,131.861L133.943,433.454z M452.637,139.375 l-199.72,247.182L117.495,245.772L355.77,37.701c13.944-14.589,57.664-31.155,92.815,4.206 C474.246,67.722,475.598,110.958,452.637,139.375z"/></svg>
              </button>
              <button class="popover-btn" data-subtool="laser" title="Laser Pointer (Ctrl+Shift+L)">
                <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="12" r="3"/><path fill-rule="evenodd" d="M12 2a1 1 0 0 1 1 1v3a1 1 0 0 1-2 0V3a1 1 0 0 1 1-1zm0 15a1 1 0 0 1 1 1v3a1 1 0 0 1-2 0v-3a1 1 0 0 1 1-1zM2 12a1 1 0 0 1 1-1h3a1 1 0 0 1 0 2H3a1 1 0 0 1-1-1zm15 0a1 1 0 0 1 1-1h3a1 1 0 0 1 0 2h-3a1 1 0 0 1-1-1zM4.93 4.93a1 1 0 0 1 1.41 0l2.12 2.12a1 1 0 0 1-1.41 1.42L4.93 6.34a1 1 0 0 1 0-1.41zm10.6 10.6a1 1 0 0 1 1.42 0l2.12 2.12a1 1 0 0 1-1.42 1.42l-2.12-2.12a1 1 0 0 1 0-1.42zM19.07 4.93a1 1 0 0 1 0 1.41l-2.12 2.12a1 1 0 1 1-1.42-1.42l2.12-2.11a1 1 0 0 1 1.42 0zM8.46 15.54a1 1 0 0 1 0 1.41l-2.12 2.12a1 1 0 0 1-1.41-1.42l2.12-2.11a1 1 0 0 1 1.41 0z"/></svg>
              </button>
              <button class="popover-btn" data-subtool="text" title="Sticky Note Tool (Ctrl+Shift+T)">
                <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M5 4h14a1 1 0 0 1 0 2h-6v13h3a1 1 0 0 1 0 2H8a1 1 0 0 1 0-2h3V6H5a1 1 0 0 1 0-2z"/></svg>
              </button>
            </div>
          </div>



          <!-- 4. Shapes Group -->
          <div class="grouped-tool-container" id="shapesGroupContainer">
            <button class="tool-button icon-tool grouped-main-btn" data-tool="shapes" id="shapesGroupBtn" title="Magic Shapes (Active: Rectangle)">
              <svg id="shapesGroupIcon" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path fill-rule="evenodd" d="M3 3h10v10H3V3zm2 2v6h6V5H5z"/><path fill-rule="evenodd" d="M16 10a6 6 0 1 0 0 12 6 6 0 0 0 0-12zm-4 6a4 4 0 1 1 8 0 4 4 0 0 1-8 0z"/></svg>
              <span class="group-indicator" aria-hidden="true"></span>
            </button>
            <div class="grouped-popover" id="shapesGroupPopover">
              <button class="popover-btn active" data-subshape="rectangle" title="Rectangle"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path fill-rule="evenodd" d="M4 4h16v16H4V4zm2 2v12h12V6H6z"/></svg></button>
              <button class="popover-btn" data-subshape="circle" title="Circle"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path fill-rule="evenodd" d="M12 4a8 8 0 1 0 0 16 8 8 0 0 0 0-16zM2 12C2 6.5 6.5 2 12 2s10 4.5 10 10-4.5 10-10 10S2 17.5 2 12z"/></svg></button>
              <button class="popover-btn" data-subshape="line" title="Straight Line"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="3" y="11" width="22" height="2.5" rx="1" transform="rotate(-45 12 12)"/></svg></button>
              <button class="popover-btn" data-subshape="arrow" title="Arrow"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M4 11h12.2l-4.6-4.6a1 1 0 0 1 1.4-1.4l6.7 6.7a1 1 0 0 1 0 1.4l-6.7 6.7a1 1 0 0 1-1.4-1.4L16.2 13H4a1 1 0 0 1 0-2z"/></svg></button>
              <button class="popover-btn" data-subshape="triangle" title="Triangle"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path fill-rule="evenodd" d="M12 3l10 17H2L12 3zm0 4.5L5.5 18h13L12 7.5z"/></svg></button>
            </div>
          </div>

          <!-- 5. Eraser -->
          <button class="tool-button icon-tool" id="eraserBtn" data-tool="eraser" title="Eraser Tool" aria-label="Eraser tool">
            <svg width="24" height="24" viewBox="0 0 256 256" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M38.032 127.602l76.405-78.588c3.074-3.162 9.157-5.737 13.573-5.737h88.392a7.958 7.958 0 0 1 7.966 7.996l-.243 63.237c-.017 4.412-2.563 10.53-5.686 13.655l-74.118 74.176c-3.121 3.124-9.239 5.659-13.66 5.659H40.46c-4.425 0-8.005-3.577-8.005-7.99v-58.682c0-4.414 2.497-10.558 5.577-13.726zM120.002 144h-63.98c-4.405 0-7.997 3.578-7.997 7.993v32.09a7.992 7.992 0 0 0 7.998 7.993h63.98c4.405 0 7.997-3.578 7.997-7.993v-32.09a7.992 7.992 0 0 0-7.998-7.993zm29.638-6.036c-3.115 3.14-5.64 9.268-5.64 13.685v21.72c0 4.418 2.476 5.42 5.542 2.227l53.585-55.823c3.06-3.188 5.542-9.36 5.542-13.771V80.459c0-1.105-.63-1.365-1.41-.578l-57.62 58.083zm-18.046-78.59c-1.66.03-3.966 1-5.143 2.16l-61.065 60.197c-3.146 3.102-2.114 5.616 2.306 5.616h60.119c4.42 0 10.559-2.506 13.71-5.596l63.519-62.277c.788-.773.525-1.384-.577-1.365l-72.869 1.266z" fill-rule="evenodd"/></svg>
          </button>

          <!-- 6. Pen Size Dot & Opacity -->
          <div class="grouped-tool-container" id="penSizeContainer">
            <button class="tool-button icon-tool grouped-main-btn" id="penSizeBtn" title="Stroke Thickness & Opacity (Click to change)">
              <span class="size-dot-preview" id="sizeDotPreview" style="width: 8px; height: 8px;"></span>
              <span class="group-indicator" aria-hidden="true"></span>
            </button>
            <div class="grouped-popover popover-stacked" id="penSizePopover">
              <div class="popover-row">
                <button class="popover-btn size-btn" data-size="2" title="Fine (2px)"><span class="size-dot" style="width: 4px; height: 4px;"></span></button>
                <button class="popover-btn size-btn" data-size="4" title="Normal (4px)"><span class="size-dot" style="width: 6px; height: 6px;"></span></button>
                <button class="popover-btn size-btn active" data-size="8" title="Medium (8px)"><span class="size-dot" style="width: 8px; height: 8px;"></span></button>
                <button class="popover-btn size-btn" data-size="16" title="Thick (16px)"><span class="size-dot" style="width: 12px; height: 12px;"></span></button>
                <button class="popover-btn size-btn" data-size="24" title="Marker (24px)"><span class="size-dot" style="width: 16px; height: 16px;"></span></button>
              </div>
              <div class="popover-row-divider"></div>
              <div class="popover-row slider-row">
                <div class="slider-control-item">
                  <div class="slider-label-row">
                    <span class="slider-label-text">Opacity</span>
                    <span id="opacityValDisplay" class="slider-val">100%</span>
                  </div>
                  <input id="inlineOpacityRange" type="range" min="0.1" max="1" step="0.05" value="1" class="mini-slider" />
                </div>
              </div>
            </div>
          </div>

          <!-- 1b. View Group (Hide/Show Overlay + Presentation) -->
          <div class="grouped-tool-container" id="selectGroupContainer">
            <button class="tool-button icon-tool grouped-main-btn" id="selectButton" data-tool="spotlight" title="View / Presenter Tools" aria-label="View and presenter tools">
              <svg id="selectGroupIcon" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 4C5 4 1 12 1 12s4 8 11 8 11-8 11-8-4-8-11-8zm0 13a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/><circle cx="12" cy="12" r="2.5"/></svg>
              <span class="group-indicator" aria-hidden="true"></span>
            </button>
            <div class="grouped-popover" id="selectGroupPopover">
              <button class="popover-btn" id="toggleOverlayBtn" title="Hide Overlay (Ctrl+Alt+H)" aria-label="Toggle overlay visibility">
                <svg id="eyeIcon" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 4C5 4 1 12 1 12s4 8 11 8 11-8 11-8-4-8-11-8zm0 13a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/><circle cx="12" cy="12" r="2.5"/></svg>
              </button>
              <button class="popover-btn" data-subtool="spotlight" title="Presenter Spotlight">
                <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path fill-rule="evenodd" d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 3l1.8 3.6L18 10l-3.2 2.4L16 16l-4-2.5L8 16l1.2-3.6L6 10l4.2-1.4L12 5z"/></svg>
              </button>
              <button class="popover-btn" data-subtool="magnifier" title="Magnifier Tool">
                <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path fill-rule="evenodd" d="M10.5 2a8.5 8.5 0 0 1 6.6 13.7l4.6 4.6a1 1 0 0 1-1.4 1.4l-4.6-4.6A8.5 8.5 0 1 1 10.5 2zm0 2a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13zm1 3a1 1 0 0 0-2 0v2.5H7a1 1 0 0 0 0 2h2.5V14a1 1 0 0 0 2 0v-2.5H14a1 1 0 0 0 0-2h-2.5V7z"/></svg>
              </button>
              <div class="popover-row-divider" id="spotlightControlsDivider" style="display: none;"></div>
              <div class="popover-row slider-row" id="spotlightControls" style="display: none;">
                <div class="slider-control-item">
                  <div class="slider-label-row">
                    <span class="slider-label-text">Radius</span>
                    <span id="spotlightRadiusVal" class="slider-val">150px</span>
                  </div>
                  <input type="range" id="spotlightRadiusRange" min="50" max="400" step="10" value="150" class="mini-slider" />
                </div>
                <div class="slider-control-item">
                  <div class="slider-label-row">
                    <span class="slider-label-text">Darkness</span>
                    <span id="spotlightAlphaVal" class="slider-val">75%</span>
                  </div>
                  <input type="range" id="spotlightAlphaRange" min="0.2" max="0.95" step="0.05" value="0.75" class="mini-slider" />
                </div>
              </div>
            </div>
          </div>

          <div class="divider"></div>

          <!-- 7. Undo -->
          <button class="action-icon-btn" id="undoButton" title="Undo (Ctrl+Shift+Z)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7H15C16.8692 7 17.8039 7 18.5 7.40193C18.9561 7.66523 19.3348 8.04394 19.5981 8.49999C20 9.19615 20 10.1308 20 12C20 13.8692 20 14.8038 19.5981 15.5C19.3348 15.9561 18.9561 16.3348 18.5 16.5981C17.8039 17 16.8692 17 15 17H8.00001M4 7L7 4M4 7L7 10"/></svg>
          </button>

          <!-- 8. Clear Screen -->
          <button class="action-icon-btn danger" id="clearButton" title="Clear All Annotations (Ctrl+Alt+C)">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M9 3a1 1 0 0 0-1 1v1H4a1 1 0 0 0 0 2h1l1.1 12.2A2 2 0 0 0 8.1 21h7.8a2 2 0 0 0 2-1.8L19 7h1a1 1 0 0 0 0-2h-4V4a1 1 0 0 0-1-1H9zm1 2h4v1h-4V5zm-3 4h10l-1 10H8L7 9z"/></svg>
          </button>

          <!-- 9. Whiteboard (Scrble Ink style) -->
          <div class="grouped-tool-container" id="whiteboardContainer">
            <button class="tool-button icon-tool grouped-main-btn" id="whiteboardBtn" title="Whiteboard / Digital Paper">
              <svg viewBox="0 0 512 512" fill="currentColor" stroke="none"><path d="M512,0H0v40h16v296h480V40h16V0z M464,304H48V40h416V304z"/><rect x="240" y="352" width="32" height="160"/><polygon points="113.273,512 145.273,512 212.179,352 180.179,352"/><polygon points="299.82,352 366.726,512 398.726,512 331.82,352"/><path d="M149.797,214.883c12.969,0,23.469-10.508,23.469-23.469c0-1.805-0.25-3.547-0.633-5.242l53.726-34.774c3.938,2.985,8.781,4.821,14.094,4.821c0.664,0,1.289-0.141,1.938-0.195l13.57,29.398c-4.297,4.25-6.961,10.14-6.961,16.664c0,12.961,10.5,23.469,23.453,23.469c12.969,0,23.469-10.508,23.469-23.469c0-1.594-0.164-3.149-0.469-4.649l71.766-43.758c4.016,3.211,9.039,5.211,14.578,5.211c12.969,0,23.469-10.508,23.469-23.469c0-12.962-10.5-23.462-23.469-23.462c-12.961,0-23.461,10.5-23.461,23.462c0,1.594,0.164,3.148,0.468,4.648l-71.773,43.758c-4.016-3.202-9.039-5.202-14.578-5.202c-0.656,0-1.274,0.14-1.922,0.195l-13.57-29.406c4.297-4.25,6.961-10.141,6.961-16.664c0-12.961-10.5-23.461-23.469-23.461C227.5,109.29,217,119.79,217,132.75c0,1.812,0.25,3.554,0.633,5.242l-53.734,34.774c-3.93-2.976-8.782-4.812-14.102-4.812c-12.969,0-23.469,10.5-23.469,23.461S136.828,214.883,149.797,214.883z"/></svg>
              <span class="group-indicator" aria-hidden="true"></span>
            </button>
            <div class="grouped-popover" id="whiteboardPopover">
              <div class="popover-row">
                <button class="popover-btn active" data-bg="whiteboard" title="Pure Whiteboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="12" rx="2" fill="#ffffff" stroke="#ccc"/></svg></button>
                <button class="popover-btn" data-bg="blackboard" title="Blackboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="12" rx="2" fill="#18181c" stroke="#888"/></svg></button>
              </div>
            </div>
          </div>

          <!-- 10. Screenshot -->
          <button class="action-icon-btn" id="screenshotButton" title="Take Screenshot (PNG/JPEG)">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M17,5C18.0544,5,18.9182,5.81588,18.9945,6.85074L19,7L19,17L21,17C21.5523,17,22,17.4477,22,18C22,18.5129,21.614,18.9355,21.1166,18.9933L21,19L19,19L19,21C19,21.5523,18.5523,22,18,22C17.4872,22,17.0645,21.614,17.0067,21.1166L17,21L17,7L9,7L9,5L17,5Z M6,2C6.51283,2,6.93551,2.38604,6.99327,2.88338L7,3L7,17L15,17L15,19L7,19C5.94564,19,5.08183,18.1842,5.00549,17.1493L5,17L5,7L3,7C2.44772,7,2,6.55228,2,6C2,5.48717,2.38604,5.06449,2.88338,5.00673L3,5L5,5L5,3C5,2.44772,5.44772,2,6,2Z"/></svg>
          </button>

          <!-- 11. Settings -->
          <button class="tool-button icon-tool" id="settingsButton" title="Settings">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
          </button>

          <div class="divider"></div>

          <!-- 12. Current Color Chip + Quiet Palette -->
          <div class="grouped-tool-container" id="colorContainer">
            <button class="tool-button icon-tool grouped-main-btn color-chip-btn" id="colorChipBtn" title="Color Palette">
              <span class="current-color-chip" id="currentColorChip" style="background-color: #ff5a5f;"></span>
              <span class="group-indicator" aria-hidden="true"></span>
            </button>
            <div class="grouped-popover palette-popover" id="inlineColorSwatches" aria-label="Quick Color Palette">
              <div class="swatch-grid">
                <button class="swatch-btn active" data-color="#ff5a5f" style="background-color: #ff5a5f;" title="Coral Red"></button>
                <button class="swatch-btn" data-color="#ffe36d" style="background-color: #ffe36d;" title="Lemon Yellow"></button>
                <button class="swatch-btn" data-color="#00d26a" style="background-color: #00d26a;" title="Emerald Green"></button>
                <button class="swatch-btn" data-color="#3b82f6" style="background-color: #3b82f6;" title="Electric Blue"></button>
                <button class="swatch-btn" data-color="#ffffff" style="background-color: #ffffff;" title="White"></button>
                <label class="custom-swatch-picker swatch-btn" title="Pick Custom Color">
                  <span class="custom-plus">+</span>
                  <input type="color" id="inlineCustomColorPicker" value="#ff5a5f">
                </label>
              </div>
            </div>
          </div>
        </div>
      </nav>

      <aside class="toolbar-settings-panel" id="toolbarSettingsPanel" aria-hidden="true">
        <header class="toolbar-settings-head">
          <div>
            <h2>Settings</h2>
            <p>Toolbar-attached controls</p>
          </div>
          <button class="settings-close-btn" id="toolbarSettingsClose" type="button" aria-label="Close settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </header>

        <nav class="toolbar-settings-tabs" aria-label="Settings tabs">
          <button class="toolbar-settings-tab active" type="button" data-settings-tab="brush">Brush</button>
          <button class="toolbar-settings-tab" type="button" data-settings-tab="export">Export</button>
          <button class="toolbar-settings-tab" type="button" data-settings-tab="hotkeys">Keys</button>
        </nav>

        <section class="toolbar-settings-body">
          <div class="toolbar-settings-page active" data-settings-page="brush">
            <article class="settings-mini-group">
              <h3>Pen</h3>
              <label class="settings-row">
                <span>Color</span>
                <input id="tsPenColor" type="color" />
              </label>
              <label class="settings-row">
                <span>Width <strong id="tsPenWidthVal">4px</strong></span>
                <input id="tsPenWidth" type="range" min="1" max="24" step="1" />
              </label>
              <label class="settings-row">
                <span>Opacity <strong id="tsPenOpacityVal">100%</strong></span>
                <input id="tsPenOpacity" type="range" min="0.1" max="1" step="0.05" />
              </label>
            </article>

            <article class="settings-mini-group">
              <h3>Highlighter</h3>
              <label class="settings-row">
                <span>Color</span>
                <input id="tsHighlighterColor" type="color" />
              </label>
              <label class="settings-row">
                <span>Width <strong id="tsHighlighterWidthVal">18px</strong></span>
                <input id="tsHighlighterWidth" type="range" min="8" max="40" step="1" />
              </label>
              <label class="settings-row">
                <span>Opacity <strong id="tsHighlighterOpacityVal">30%</strong></span>
                <input id="tsHighlighterOpacity" type="range" min="0.1" max="1" step="0.05" />
              </label>
            </article>

            <article class="settings-mini-group">
              <h3>Eraser</h3>
              <label class="settings-row">
                <span>Radius <strong id="tsEraserRadiusVal">18px</strong></span>
                <input id="tsEraserRadius" type="range" min="4" max="60" step="1" />
              </label>
            </article>
          </div>

          <div class="toolbar-settings-page" data-settings-page="export">
            <article class="settings-mini-group">
              <h3>Screenshot</h3>
              <label class="settings-row">
                <span>Format</span>
                <select id="tsExportFormat">
                  <option value="png">PNG</option>
                  <option value="jpeg">JPEG</option>
                  <option value="webp">WebP</option>
                </select>
              </label>
              <label class="settings-row" id="tsExportQualityRow">
                <span>Quality <strong id="tsExportQualityVal">90%</strong></span>
                <input id="tsExportQuality" type="range" min="0.1" max="1" step="0.05" />
              </label>
              <label class="settings-check-row">
                <input id="tsExportIncludeBackground" type="checkbox" />
                <span>Include desktop background</span>
              </label>
              <label class="settings-check-row">
                <input id="tsExportCopyToClipboard" type="checkbox" />
                <span>Copy screenshots to clipboard</span>
              </label>
            </article>
          </div>

          <div class="toolbar-settings-page" data-settings-page="hotkeys">
            <div class="toolbar-hotkey-list" id="toolbarHotkeyList"></div>
          </div>
        </section>

        <footer class="toolbar-settings-foot">
          <span class="toolbar-settings-message" id="toolbarSettingsMessage">Changes need saving.</span>
          <div class="toolbar-settings-actions">
            <button class="toolbar-settings-secondary" id="toolbarSettingsReset" type="button">Reset</button>
            <button class="toolbar-settings-primary" id="toolbarSettingsSave" type="button">Save</button>
          </div>
        </footer>
      </aside>
    </div>
    <script src="./toolbar.js"></script>
  </body>
</html>
