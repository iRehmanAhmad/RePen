<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RePen · Countdown</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        background: transparent;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
        pointer-events: none;
        font-family: "Bahnschrift", "Segoe UI Variable Text", "Segoe UI", sans-serif;
      }
      .countdown-number {
        font-size: 160px;
        font-weight: 800;
        color: #8de7ad;
        text-shadow: 0 4px 30px rgba(0,0,0,0.8), 0 0 12px rgba(141, 231, 173, 0.4);
        opacity: 0;
        transform: scale(0.5);
        transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.8s ease;
      }
      .countdown-number.show {
        opacity: 1;
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <div class="countdown-number" id="countdownVal">3</div>
    <script src="./countdown.js"></script>
  </body>
</html>
